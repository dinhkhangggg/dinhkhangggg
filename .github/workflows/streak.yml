name: Generate Streak Stats

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0D1117
          path: streak-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit streak stats
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add streak-stats.svg || true
          git commit -m "Update streak stats" || exit 0
          git push
